[project]
id = "maretinda-storefront"
name = "Maretinda Storefront"
version = "0.1.0"

[[build.buildpacks]]
id = "google.nodejs.runtime"

[[build.buildpacks]]
id = "google.nodejs.npm"

[[build.buildpacks]]
id = "google.config.entrypoint"

[[build.env]]
name = "GOOGLE_NODEJS_VERSION"
value = "22.*"

[[build.env]]
name = "GOOGLE_NODE_ENV"
value = "production"

[[build.env]]
name = "NPM_CONFIG_PRODUCTION"
value = "false"
