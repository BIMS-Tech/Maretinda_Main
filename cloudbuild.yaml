steps:
  # Build the Docker image using the custom Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'europe-west1-docker.pkg.dev/maretinda-test/cloud-run-source-deploy/maretinda_main/medusa-backend:$COMMIT_SHA',
      '-f', 'mercur/Dockerfile',
      '.'
    ]
    dir: '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'europe-west1-docker.pkg.dev/maretinda-test/cloud-run-source-deploy/maretinda_main/medusa-backend:$COMMIT_SHA'
    ]

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'maretinda-main-test-build01',
      '--image', 'europe-west1-docker.pkg.dev/maretinda-test/cloud-run-source-deploy/maretinda_main/medusa-backend:$COMMIT_SHA',
      '--region', 'europe-west1',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8080',
      '--memory', '2Gi',
      '--cpu', '2',
      '--timeout', '3600',
      '--concurrency', '80',
      '--max-instances', '10',
      '--set-env-vars', 'NODE_ENV=production,PORT=8080'
    ]

images:
  - 'europe-west1-docker.pkg.dev/maretinda-test/cloud-run-source-deploy/maretinda_main/medusa-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100

timeout: '1800s'