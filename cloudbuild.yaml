# Google Cloud Build configuration for Maretinda Storefront
steps:
  # Install dependencies
  - name: 'node:22-alpine'
    entrypoint: 'npm'
    args: ['install']
    dir: 'b2c-marketplace-storefront'
    
  # Build the Next.js application
  - name: 'node:22-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'b2c-marketplace-storefront'
    env:
      - 'NODE_ENV=production'
    
  # Build and push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - '$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'
      
  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_DEPLOY_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--max-instances'
      - '10'

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Substitutions (can be overridden)
substitutions:
  _GCR_HOSTNAME: europe-west1-docker.pkg.dev
  _SERVICE_NAME: maretinda-storefront
  _DEPLOY_REGION: europe-west1
  
# Images to be pushed to registry
images:
  - '$_GCR_HOSTNAME/$PROJECT_ID/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
